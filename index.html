<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire Mind - الذكاء الاصطناعي الجزائري</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        :root {
            --dz-green: #006633;
            --dz-red: #d21034;
            --fire-orange: #ff4500;
            --dark-bg: #0b0f19;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--dark-bg);
            background-image: 
                radial-gradient(circle at top right, rgba(0, 102, 51, 0.2), transparent),
                radial-gradient(circle at bottom left, rgba(210, 16, 52, 0.1), transparent);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .chat-container {
            width: 95%;
            max-width: 500px;
            height: 85vh;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .header {
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            text-align: center;
            border-bottom: 2px solid var(--dz-green);
            border-radius: 25px 25px 0 0;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            background: linear-gradient(to right, #fff, var(--fire-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scrollbar-width: thin;
            scrollbar-color: var(--dz-green) transparent;
        }

        .ai-msg, .user-msg {
            max-width: 85%;
            padding: 12px 16px;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .ai-msg {
            background: rgba(0, 102, 51, 0.15);
            border-radius: 18px 18px 18px 0;
            align-self: flex-start;
            border-left: 3px solid var(--dz-green);
        }

        .user-msg {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 18px 18px 0 18px;
            align-self: flex-end;
            border-right: 3px solid var(--dz-red);
        }

        .input-area {
            padding: 20px;
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.2);
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 15px;
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--dz-green);
            background: rgba(255, 255, 255, 0.1);
        }

        button {
            background: var(--dz-green);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: var(--dz-red);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <h1>🔥 Fire Mind</h1>
        <small style="color: #aaa;">الذكاء الاصطناعي اللي يفهمك بالدارجة</small>
    </div>
    
    <div id="chat-box">
        <div class="ai-msg">واش يا خويا/ختي؟ أني هنا باش نعاونك، واش كاين في بالك اليوم؟</div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="اكتب ميساج هنا..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">إرسال</button>
    </div>
</div>
<script>
    // ضع مفتاح الـ Token الخاص بك هنا بين علامتي التنصيص
    const HF_TOKEN = "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"; 

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');
        const userText = input.value.trim();

        if (!userText) return;

        // إظهار رسالة المستخدم
        chatBox.innerHTML += `<div class="user-msg">${userText}</div>`;
        input.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;

        // رسالة الانتظار
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'ai-msg';
        loadingDiv.innerText = 'راني نخمم...';
        chatBox.appendChild(loadingDiv);

        try {
            const response = await fetch("https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${HF_TOKEN}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    inputs: `<s>[INST] أنت مساعد ذكي جزائري اسمك Fire Mind. أجب دائماً بالدارجة الجزائرية فقط وبطريقة ودودة. السؤال: ${userText} [/INST]`,
                    parameters: { max_new_tokens: 250, return_full_text: false }
                })
            });

            const data = await response.json();
            
            // استخراج النص وتمريره للواجهة
            let aiResponse = "";
            if (Array.isArray(data) && data[0].generated_text) {
                aiResponse = data[0].generated_text.trim();
            } else {
                aiResponse = "يا خويا كاين ضغط كبير على السيرفر، عاود جرب بعد شوية.";
            }
            
            loadingDiv.innerText = aiResponse;
        } catch (error) {
            loadingDiv.innerText = "صرا مشكل في الكونيكسيو، عاود جرب يا خويا.";
            console.error(error);
        }
        
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>


</body>
</html>

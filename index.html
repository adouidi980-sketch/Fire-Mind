<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire Mind AI | مساعدك الجزائري</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #131314;
            --txt-color: #e3e3e3;
            --user-msg-bg: #2b2a2a;
            --ai-accent: #4b90ff;
            --dz-red: #ea4335;
            --dz-green: #34a853;
        }

        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            background-color: var(--bg-color);
            color: var(--txt-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* الهيدر */
        .header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #333;
        }

        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            background: linear-gradient(45deg, #ff4e50, #f9d423);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* منطقة الدردشة */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .message {
            display: flex;
            gap: 15px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.2rem;
        }

        .user-msg { justify-content: flex-end; }
        .user-msg .content {
            background-color: var(--user-msg-bg);
            padding: 12px 18px;
            border-radius: 20px;
            max-width: 80%;
        }

        .ai-msg .content {
            line-height: 1.8;
            max-width: 90%;
        }

        /* شريط الإدخال */
        .input-wrapper {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .input-area {
            background: #1e1f20;
            border-radius: 30px;
            padding: 5px 15px;
            display: flex;
            align-items: center;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .input-area:focus-within {
            border-color: #555;
            background: #28292a;
        }

        input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            padding: 15px;
            font-size: 1rem;
            outline: none;
            font-family: inherit;
        }

        button {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--ai-accent);
            font-weight: bold;
            padding: 10px;
            transition: transform 0.2s;
        }

        button:hover { transform: scale(1.1); }

        /* حالة التفكير */
        .typing {
            font-size: 0.8rem;
            color: #888;
            margin-right: 50px;
            display: none;
        }

        /* سكرول بار أنيق */
        #chat-container::-webkit-scrollbar { width: 6px; }
        #chat-container::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">🔥 Fire Mind</div>
        <div style="font-size: 0.8rem; color: var(--dz-green);">متصل 🇩🇿</div>
    </div>

    <div id="chat-container">
        <div class="message ai-msg">
            <div class="avatar">🤖</div>
            <div class="content">واش يا خويا؟ أنا Fire Mind، مساعدك الذكي. واش راهو في بالك اليوم؟ راني هنا باش نعاونك بالدارجة.</div>
        </div>
    </div>

    <div class="typing" id="status">Fire Mind راهو يكتب...</div>

    <div class="input-wrapper">
        <div class="input-area">
            <input type="text" id="user-input" placeholder="اكتب هنا..." autocomplete="off">
            <button onclick="sendMessage()">إرسال</button>
        </div>
        <p style="text-align: center; font-size: 0.7rem; color: #666; margin-top: 10px;">Fire Mind قد يرتكب أخطاء، تأكد من المعلومات المهمة.</p>
    </div>
<script>
    // 1. ضع مفتاح الـ Token الخاص بك هنا (تأكد أنه يبدأ بـ hf_ ومحاط بعلامات تنصيص)
    const HF_TOKEN = "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"; 

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const container = document.getElementById('chat-container');
        const status = document.getElementById('status');
        const text = input.value.trim();

        if (!text) return;

        // إظهار رسالة المستخدم في الواجهة
        container.innerHTML += `
            <div class="message user-msg">
                <div class="content">${text}</div>
            </div>
        `;
        
        input.value = '';
        status.style.display = 'block'; // إظهار أن Fire Mind يفكر
        container.scrollTop = container.scrollHeight;

        try {
            // استخدام موديل Mistral أو Zephyr (كلاهما ممتاز للدارجة)
            const response = await fetch("https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${HF_TOKEN}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    inputs: `<s>[INST] أنت مساعد ذكي جزائري اسمك Fire Mind. أجب دائماً بالدارجة الجزائرية فقط وباختصار. السؤال: ${text} [/INST]`,
                    parameters: { 
                        max_new_tokens: 250, 
                        temperature: 0.7,
                        wait_for_model: true // مهم جداً لتجنب أخطاء السيرفر
                    }
                })
            });

            // التحقق من استجابة السيرفر
            if (!response.ok) {
                const errorDetail = await response.json();
                console.error("Detail:", errorDetail);
                throw new Error("API Error");
            }

            const data = await response.json();
            let aiResponse = "";

            if (Array.isArray(data) && data[0].generated_text) {
                // تنظيف النص لإظهار الإجابة فقط بعد التاج [/INST]
                const rawText = data[0].generated_text;
                aiResponse = rawText.includes('[/INST]') ? rawText.split('[/INST]').pop().trim() : rawText.trim();
            } else {
                aiResponse = "يا خويا السيرفر راه معمر، عاود ابعث الميساج بعد شوية.";
            }

            // إظهار رد الذكاء الاصطناعي
            container.innerHTML += `
                <div class="message ai-msg">
                    <div class="avatar">✨</div>
                    <div class="content">${aiResponse}</div>
                </div>
            `;

        } catch (error) {
            console.error("Full Error:", error);
            container.innerHTML += `
                <div class="message ai-msg">
                    <div class="avatar">⚠️</div>
                    <div class="content">صرا مشكل في الربط (CORS أو Token). تأكد من تفعيل الـ Token من الإيميل.</div>
                </div>
            `;
        }

        status.style.display = 'none';
        container.scrollTop = container.scrollHeight;
    }

    // السماح بالإرسال عند الضغط على زر Enter
    document.getElementById('user-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
   
</body>
</html>

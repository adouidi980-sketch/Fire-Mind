<script>
    // ضع مفتاح الـ API الذي ستحصل عليه بعد تفعيل الـ VPN
    const API_KEY = "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"; 

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');
        const userText = input.value;

        if (!userText) return;

        chatBox.innerHTML += `<div class="user-msg"><b>أنت:</b> ${userText}</div>`;
        input.value = '';

        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'ai-msg';
        loadingDiv.innerText = 'راني نخمم... (جاري التفكير)';
        chatBox.appendChild(loadingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ 
                        parts: [{ 
                            // هنا نعطيه التعليمات ليتحدث بالدارجة الجزائرية
                            text: `أنت مساعد ذكي جزائري. أجب دائماً بالدارجة الجزائرية (الجزائر العاصمة أو وهران أو قسنطينة). كن ودوداً ومرحاً. السؤال هو: ${userText}` 
                        }] 
                    }]
                })
            });

            const data = await response.json();
            const aiResponse = data.candidates[0].content.parts[0].text;

            loadingDiv.innerText = aiResponse;
        } catch (error) {
            loadingDiv.innerText = "يا خويا صرا مشكل في الريزو، عاود جرب شوية ثانية.";
            console.error(error);
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
